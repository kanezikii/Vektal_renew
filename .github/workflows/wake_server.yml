name: Wake Up Renqi Server (Single Repo + Secret Proxy)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-wake-script:
    runs-on: ubuntu-latest
    steps:
      - name: 获取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Playwright 及相关依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium
          playwright install-deps

      # ==========================================
      - name: 启动 Xray 代理内核
        env:
          # 将刚才在 GitHub 配置的 JSON 赋值给环境变量
          NODE_CONFIG: ${{ secrets.XRAY_JSON }}
        run: |
          echo "下载完整版 Xray-core..."
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q xray.zip -d xray-core
          
          chmod +x xray-core/xray
          
          # 安全地将环境变量中的 JSON 写入配置文件
          echo "$NODE_CONFIG" > xray-core/config.json
          
          echo "在后台启动 Xray 代理服务..."
          cd xray-core
          nohup ./xray run -c config.json > xray.log 2>&1 &
          
          echo "等待 10 秒，让家宽节点有充足时间建立连接..."
          sleep 10
          
          echo "测试代理连通性 (使用 HTTP 协议，允许最长等待 15 秒)..."
          if curl -x http://127.0.0.1:10808 -s -m 15 https://api.ipify.org; then
            echo -e "\n✅ 代理连接成功！可以继续执行。"
          else
            echo -e "\n❌ 代理测试超时或失败！打印 Xray 日志供排查："
            cat xray.log
          fi
          cd ..

      # ==========================================
      # 👇 运行唤醒脚本，数据流走本地 10808 代理
      # ==========================================
      - name: 运行面板唤醒脚本 (走本地代理)
        env:
          PANEL_COOKIE: ${{ secrets.PANEL_COOKIE }}
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" python start_server.py

      - name: 提取监控截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-status-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore
