name: Wake Up Renqi Server (WARP Proxy Mode)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-wake-script:
    runs-on: ubuntu-latest
    steps:
      - name: 获取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Playwright 及相关依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium
          playwright install-deps

      # ==========================================
      # 👇 放弃 Xray，使用 Cloudflare WARP 官方客户端进行伪装
      # ==========================================
      - name: 启动 Cloudflare WARP 代理
        run: |
          echo "正在安装 Cloudflare WARP 官方客户端..."
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install cloudflare-warp -y
          
          echo "配置 WARP 为本地 Socks5 代理 (端口 10808)..."
          # 自动注册并启动 WARP 的 Socks5 代理模式
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos proxy port 10808
          warp-cli --accept-tos connect
          
          echo "等待 8 秒让 WARP 建立隧道连接..."
          sleep 8
          
          echo "测试 WARP 连通性 (查询伪装后的 Cloudflare IP)..."
          curl -x socks5://127.0.0.1:10808 -s https://ifconfig.me || echo "WARP 测试无响应，强行进入下一步"

      # ==========================================
      # 👇 运行唤醒脚本，数据流走本地 10808 代理
      # ==========================================
      - name: 运行面板唤醒脚本
        env:
          PANEL_COOKIE: ${{ secrets.PANEL_COOKIE }}
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" python start_server.py

      - name: 提取监控截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-status-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore
