name: Wake Up Renqi Server (Xray Proxy Mode)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-wake-script:
    runs-on: ubuntu-latest
    steps:
      - name: 获取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Playwright 及相关依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium
          playwright install-deps

      # ==========================================
      # 👇 从 Secrets 读取节点 JSON 并启动代理
      # ==========================================
      - name: 启动 Xray 代理内核
        env:
          # 将 GitHub Secrets 里的节点配置读取为环境变量
          NODE_CONFIG: ${{ secrets.XRAY_JSON }}
        run: |
          echo "下载 Xray-core..."
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q xray.zip -d xray-core
          
          chmod +x xray-core/xray
          
          echo "将 Secrets 中的节点配置安全写入文件..."
          echo "$NODE_CONFIG" > xray-core/config.json
          
          echo "在后台启动 Xray 代理服务..."
          cd xray-core
          nohup ./xray run -c config.json > xray.log 2>&1 &
          
          echo "等待 10 秒确保家宽节点连接成功..."
          sleep 10
          
          echo "测试代理连通性 (允许最长等待 15 秒)..."
          curl -x socks5://127.0.0.1:10808 -s -m 15 https://api.ipify.org || echo "代理测试未返回，强行进入下一步"
          cd ..

      # ==========================================
      # 👇 运行面板唤醒脚本
      # ==========================================
      - name: 运行面板唤醒脚本 (走本地代理)
        env:
          PANEL_COOKIE: ${{ secrets.PANEL_COOKIE }}
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" python start_server.py

      - name: 提取监控截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-status-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore
